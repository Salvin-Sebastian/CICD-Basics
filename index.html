<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salvin Sebastian</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 600px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            text-align: center;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .id {
            font-size: 0.9em;
            color: #dcdcdc;
            margin-bottom: 20px;
        }

        .content {
            font-size: 1.05em;
            line-height: 1.6;
            color: #f1f1f1;
        }

        .highlight {
            color: #00ffd5;
            font-weight: bold;
        }

        .divider {
            margin: 20px auto;
            width: 50px;
            height: 3px;
            background: #00ffd5;
            border-radius: 5px;
        }

        .github-link {
            margin-top: 25px;
        }

        .github-link img {
            width: 40px;
            height: 40px;
            transition: transform 0.2s;
        }

        .github-link img:hover {
            transform: scale(1.2);
        }

        @media (max-width: 500px) {
            h1 {
                font-size: 2em;
            }
            .content {
                font-size: 0.95em;
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>HI</h1>
        <div class="divider"></div>
        <div class="id">µlearn id: salvinsebastian@mulearn</div>

        <div class="content">
            My name is <span class="highlight">Salvin Sebastian</span>.<br><br>
            BCA Student at Kristu Jyoti College | Aspiring Cybersecurity & Ethical Hacking Enthusiast | 
            Passionate about Protecting Digital Systems | Building Strong Skills in Programming, Networking, 
            and IT Security | DevOps
        </div>

        <div class="github-link">
            <a href="https://github.com/salvin-sebastian" target="_blank">
                <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/github.svg" alt="GitHub Logo">
            </a>
        </div>
    </div>

</body>
</html>
